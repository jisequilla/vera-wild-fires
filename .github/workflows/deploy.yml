name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # HEAD^ para notify-changes
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
      # Único punto de notificación: TODO publish pasa por aquí (push directo o dispatch del cron),
      # así el mismo cambio nunca notifica dos veces. El script sale 0 siempre.
      - name: Notificar cambios relevantes (ntfy)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node scripts/notify-changes.mjs --base HEAD^
